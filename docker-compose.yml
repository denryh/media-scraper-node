services:
  postgres:
    image: postgres:16-alpine
    container_name: media-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scraper
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scraper"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: media-redis
    command: ["redis-server", "--maxmemory", "96mb", "--maxmemory-policy", "noeviction", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
    container_name: app
    # Hard caps applied to the constrained component. Compose v2 honors both
    # mem_limit/cpus (legacy) and deploy.resources.limits (modern); we set
    # both so this is enforced regardless of which path the local Compose uses.
    mem_limit: 1g
    cpus: 1.0
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=768"
      PORT: "3000"
      LOG_LEVEL: info
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/scraper
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_HOST_PORT:-3001}:3000"

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: media-web
    ports:
      - "8080:80"
    depends_on:
      - app

volumes:
  pgdata: {}
