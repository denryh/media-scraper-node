server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  resolver 127.0.0.11 valid=10s ipv6=off;

  location / {
    try_files $uri /index.html;
  }

  # API passthrough. Regex location with a capture group lets us construct
  # the upstream URL explicitly, including stripping /api/. Variable in
  # proxy_pass defers DNS resolution to request time, so nginx starts even
  # if `app` isn't reachable yet.
  location ~ ^/api/(.*)$ {
    set $upstream_app "app:3000";
    proxy_pass http://$upstream_app/$1$is_args$args;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }
}
